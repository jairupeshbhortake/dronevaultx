services:
  open-dronelog:
    build: .
    container_name: open-dronelog
    hostname: open-dronelog
    ports:
      - "8080:80"
    volumes:
      - drone-data:/data/drone-logbook
      # Uncomment to mount custom parser scripts and parser config
      # - ./plugins:/app/plugins
      # - ./plugins/parsers.json:/app/plugins/parsers.json:ro
      # Uncomment and set your sync folder path to enable automatic log import
      # - /path/to/your/drone/logs/on/host/device:/sync-logs:ro
      # Uncomment to persist uploaded files to a host folder (when KEEP_UPLOADED_FILES=true) - if the mount location is same host sync folder as this example, the uploaded logs through web intrface unifies with the sync folder logs collection. 
      # - /path/to/your/drone/logs/on/host/device:/data/drone-logbook/uploaded
    environment:
      - DATA_DIR=/data/drone-logbook
      - RUST_LOG=DEBUG
      - KEEP_UPLOADED_FILES=true
      # Obtain a key at https://developer.dji.com/user (see README for details).
      # - DJI_API_KEY=your_api_key_here
      # Uncomment to enable automatic sync from mounted folder
      # - SYNC_LOGS_PATH=/sync-logs
      # Uncomment to enable scheduled sync (cron expression, default: every 8 hours)
      # - SYNC_INTERVAL=0 0 */8 * * *
      # Uncomment to customize session token lifetime (default: 24 hours)
      # - SESSION_TTL_HOURS=24
      # Uncomment to require a master password for creating new profiles
      # - PROFILE_CREATION_PASS=your_master_password_here
      # Optional: set initial password for the default profile on first startup.
      # This is only applied when the default profile does not already have a password.
      # - DEFAULT_PROFILE_PASSWORD=your_default_profile_password_here
    restart: unless-stopped

volumes:
  drone-data:
